title: Silvio Gulizia - Life Hacker
logo:  # you can add own logo.
description: Writer, journalist and communication consultant. I write about life hacking at vivereintenzionalmente.com and work as head of communication and events at the VC fund Pi Campus.
baseurl: "/derrick" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com


# Author Settings
author:
  name: Silvio Gulizia
  image: '/assets/img/01.jpg'
  job: Writer and communication consultant.
  bio: Passionate about life hacking and personal growth
  email: desk@silviogulizia.com


# Contact links
contact:
  - name: Twitter
    link: https://twitter.com/silviogulizia
  - name: Facebook
    link: https://facebook.com/sgulizia
  - name: LinkedInm
    link: https://linkedin.com/in/silviogulizia


# Comment Section (Disqus)
disqus-identifier: mr-brown # add your shortname for Disqus Comment. For example mr-brown


# Google Analytics
google-analytics: # add your identifier. For example UA-99631805-1.


# Build settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-sitemap
  - jekyll/tagging

# Pages Path
defaults:
  - scope:
      path: '_pages'
    values:
      permalink: /:basename:output_ext

include:
  - _pages

# Tags
tag_page_dir:         tag
tag_page_layout:      tag-page
tag_permalink_style:  pretty

sass:
  sass_dir: _sass
  style: compressed


# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
